<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Feedback Analyzer</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <h2>Welcome to the Feedback Analyzer</h2>
            <p>Add your feedback below:</p>
            <form>
                <input type="file" name="feedback-file" accept=".txt,.csv"> <br><BR>
                <button type="submit">Analyze</button>
            </form>
        </section>
        <section>
            <h2><SMALL>RESULTS</SMALL></h2>
            <pre><code>Main Problems:</code></pre>
            <textarea name="main problems" rows="5" cols="30" placeholder="AI Output"></textarea>
            <br>
            <pre><code>Suggestions:</code></pre>
            <textarea name="suggestions" rows="5" cols="30" placeholder="Suggestions will appear here..."></textarea>
            <BR>
                <pre><code>Summary:</code></pre>
            <textarea name="summary" rows="5" cols="30" placeholder="Summary will appear here..."></textarea>
        </section>
    </main>
    <footer>
        <p>Built with Python-Aadarsh Singh.</p>
    </footer>

    
</body>
</html>
